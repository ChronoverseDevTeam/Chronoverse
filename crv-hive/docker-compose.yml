services:
  postgres:
    image: postgres:16
    container_name: crv-hive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crv}
      POSTGRES_DB: ${POSTGRES_DB:-chronoverse_dev}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-crv} -d ${POSTGRES_DB:-chronoverse_dev}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - crv-hive-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

volumes:
  crv-hive-postgres-data: